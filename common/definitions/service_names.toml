# Service name constants used for message routing in WAFER.

[services]
database = "database"
storage  = "storage"
crypto   = "crypto"
network  = "network"
logger   = "logger"
config   = "config"
runtime  = "runtime"

[operations.database]
get       = "database.get"
list      = "database.list"
create    = "database.create"
update    = "database.update"
delete    = "database.delete"
count     = "database.count"
query_raw = "database.query_raw"
exec_raw  = "database.exec_raw"

[operations.storage]
put    = "storage.put"
get    = "storage.get"
delete = "storage.delete"
list   = "storage.list"

[operations.crypto]
hash         = "crypto.hash"
compare_hash = "crypto.compare_hash"
sign         = "crypto.sign"
verify       = "crypto.verify"
random_bytes = "crypto.random_bytes"

[operations.network]
do_request = "network.do"

[operations.logger]
debug = "logger.debug"
info  = "logger.info"
warn  = "logger.warn"
error = "logger.error"

[operations.config]
get = "config.get"
set = "config.set"
